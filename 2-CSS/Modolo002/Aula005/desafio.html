<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordas Desafio</title>

    <style>
        h1{
            background-color: orange;
            border-top-right-radius: 15px;
            border-top-left-radius: 15px;

            border-bottom: 4px dotted black;

            padding: 8px;
        }

        p{
            background-color: rgb(164, 164, 218);
            border-radius: 20px;

            border-left: 12px solid darkslateblue;
            border-right: 12px solid darkslateblue;

            padding: 8px;
        }
    </style>
</head>
<body>
    <h1>Modelo de caixa</h1>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam, ullam cum adipisci, obcaecati enim dolor aliquid, consequatur quisquam nemo corrupti deserunt quos commodi nesciunt provident amet porro voluptatem sint saepe.</p>
</body>
</html>

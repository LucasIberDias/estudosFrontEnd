<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin e Padding</title>
    <style>
        body{
            border: 1px solid blue;
        }
        h1{
            border: 1px solid red;
            /*padding: 40px;
            padding-top: 40px;

            margin: 40px;
            margin-right: 40px;
            margin-left: 40px;
            margin-bottom: 0;
        }

        p{
            border: 1px solid red;
            margin: 0;
        }

        #topo{
            border: 1px solid red;
            width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="topo">
        <h1>Esse é um título de exemplo</h1>

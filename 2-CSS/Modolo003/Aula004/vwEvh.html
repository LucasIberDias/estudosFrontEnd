<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VW e VH</title>

    <style>
        .vw {
            border: 1px solid black;
            background: red;
            padding: 8px;

            width: 50vw;
        }

        .vh {
            border: 1px solid black;
            background: red;
            padding: 8px;

            width: 50vh;
        }

        #area {
            border: solid 2px black;
            width: 500px;
        }
    </style>
</head>

<body>
    <div class="vw">
        VW
    </div>

    <div class="vh">
        VH
    </div>

    <div id="area">
        <div class="vw">
            VW
        </div>

        <div class="vh">
            VH
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porcentagem e Pixel</title>
    <style>
        .pixel {
            border: 1px solid black;
            background: red;
            padding: 8px;

            width: 200px;
            height: 200px;
        }

        .porcentagem {
            border: 1px solid black;
            background: red;
            padding: 8px;

            width: 50%;
        }

        #area {
            border: solid 2px black;
            width: 500px;
        }
    </style>
</head>

<body>
    <div class="pixel">
        Pixel
    </div>

    <div class="porcentagem">
        Procentagem
    </div>

    <div id="area">
        <div class="pixel">
            Pixel
        </div>

        <div class="porcentagem">
            Procentagem
        </div>
    </div>
</body>

</html>

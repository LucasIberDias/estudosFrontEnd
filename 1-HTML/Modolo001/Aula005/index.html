<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações de texto</title>
</head>
<body>
    <h1>Formatações de texto</h1>
    <p>Esse é um texto em <b>negrito</b></p>
    <p>Esse é um texto <strong>importante</strong></p>
    <p>Esse é um texto com <em>ênfase</em></p>
    <p>Esse é um texto em <i>itálico</i></p>
    <p>Esse é um texto <mark>marcado</mark></p>
    <p>Esse é um texto <u>sublinhado</u></p>
    <p>Esse é um texto <del>apagado</del></p>

    <h2>Diferentes tipos de caracteres</h2>
    <p>Sobrescrito: 10<sup>2</sup></p>
    <p>Subscrito: H<sub>2</sub>O</p>
</body>
</html>

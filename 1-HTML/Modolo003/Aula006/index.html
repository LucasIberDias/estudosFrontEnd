<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executando vídeos</title>
</head>

<body>
    <h1>Executando vídeos</h1>

    <!--
        source = fonte
        constrols = controles
        muted = mutado
        autoplay = reprodução automatica
        loop = ciclo
        poster = cartas
    -->
    <video width="320" constrols autoplay muted loop poster="../Aula003/img/apple.svg">
        <source src="videos/abelhas.mp4" type="video/mp4">
    </video>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/t3aC11zZUjA?si=Yy3MT9h1WgKQ65y9" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <iframe src="../Aula001/index.html" width="600" height="320"></iframe>f
</body>

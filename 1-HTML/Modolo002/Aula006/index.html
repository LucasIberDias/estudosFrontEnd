<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preço</th>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>1</td>
            <td>R$2000,00</td>
        </tr>
        <tr>
            <td>Tablet</td>
            <td>3</td>
            <td>R$1000,00</td>
        </tr>

        <tr>
            <td rowspan="2">Desconto</td>
            <td colspan="2">Cupom 1 - R$20</td>
        </tr>
        <tr>
            <td colspan="2">Cupom 2 - R$30</td>
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos e Alinhamentos</title>

    <style>
        body{
            font-size: 1.5em;
            font-family: Arial, Helvetica, sans-serif;
        }

        .negrito{
            font-weight: bold;
        }

        .estilo{
            font-style: italic;
        }

        .transformacao{
            text-transform: uppercase;
        }

        .decoracao{
            text-decoration: line-through;
        }

        .entrelinhas{
            line-height: 3em;
            
        }

        .espacamento{
            letter-spacing: 0.5em;
        }

        .spcPalavras{
            word-spacing: 2em;
        }

        .recuo{
            text-indent: 2em;
        }

        .left{
            text-align: left;
        }

        .right{
            text-align: right;
        }

        .centralizado{
            text-align: center;
        }

        .justificado{
            text-align: justify;
        }
    </style>
</head>
<body>
    <h1>Formatações de textos</h1>
    <p class="negrito">Texto com negrito</p>
    <p class="estilo">Texto com estilo</p>
    <p class="transformacao">Texto com transformação</p>
    <p class="decoracao">Texto com decoração</p>
    <p class="entrelinhas">Texto com entrelinhas</p>
    <p class="espacamento">Texto com espaçamento</p>
    <p class="spcPalavras">Texto com espaçamento entre palavras</p>
    <p class="recuo">Texto com recuo</p>

    <h1>Alinhamentos</h1>
    <p class="left">Texto left</p>
    <p class="right">Texto right</p>
    <p class="centralizado">Texto centralizado</p>
    <p class="justificado">Texto justificado</p>
</body>
</html>

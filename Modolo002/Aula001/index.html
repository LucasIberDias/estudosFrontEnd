<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas ordenadas e não ordenadas</title>
</head>
<body>
    <h1>Abaixo tem uma lista não ordenada (Menus)</h1>
    <ul>
        <li>Veículos</li>
        <li>Tecnologia</li>
            <ul>
                <li>Celulares e telefones</li>
                <li>Câmeras e acessórios</li>
            </ul>
    </ul>

    <h1>Abaixo tem uma lista ordenada (Lista de compras)</h1>
    <ol>
        <li>Melancia</li>
        <li>Molho de tomato</li>
        <li>Macarrão</li>
        <li>Geléia</li>
        <ol>
            <li>Sabor laranja</li>
            <li>Sabor morango</li>
        </ol>
    </ol>

</body>
</html>

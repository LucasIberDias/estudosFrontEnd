<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais sobre Tabelas</title>
</head>

<body>
    <!--
    caption -> legenda / titulo da tabela
    theade ->  cabeçalho da tabela
    tbody -> corpo da tabela
    tfoot -> rodapé da tabela 
    -->
    <table border="1">
        <caption>Listagem de produtos</caption>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Notebook</td>
                <td>1</td>
                <td>R$2000,00</td>
            </tr>
            <tr>
                <td>Tablet</td>
                <td>3</td>
                <td>R$1000,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td colspan="2">R$ 3000,00</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>

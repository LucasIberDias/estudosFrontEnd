<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interface de login do Trello</title>

  <script src="https://unpkg.com/@codans/trello"></script>

</head>

<body>
  <img src="img/trello.svg" alt="trello logo" width="200">
  <h1>Fazer login no Trello</h1>

  <form action="" method="post">
    <input type="text" name="email" placeholder="Insira o e-mail">
    
    <input type="password" name="senha" placeholder="Insira a senha">
    
    <input type="submit" value="Fazer login">

    

    <span>ou</span>

    

    <button>
      <img src="img/google.svg" alt="google logo" width="20">
      Continuar com o Google
    </button>

    

    <button>
      <img src="img/microsoft.svg" alt="microsoft logo" width="20">
      Continuar com a Microsoft
    </button>

    

    <button>
      <img src="img/apple.svg" alt="apple logo" width="20">
      Continuar com a Apple
    </button>

    

    <button>
      <img src="img/slack.svg" alt="slack logo" width="20">
      Continuar com o Slack
    </button>
  </form>

  <img src="img/atlassian.svg" alt="logo atlassian" width="200">

  <img src="img/analytics.svg" alt="analistas imagem" width="200">

  <img src="img/interactive.svg" alt="interacao imagem" width="200">
</body>

</html>

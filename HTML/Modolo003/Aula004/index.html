<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de formularios</title>
</head>
<body>
    <h1>Exércicio de fórmulários</h1>

    <form action="../Aula001/processo.html" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome</label>
            <br>
            <input type="text" id="nome">
            <br>
            <label for="email">Email</label>
            <br>
            <input type="text" id="email">
            <br>
            <input type="checkbox" name="receberEmail" id="idReceberEmail">
            <label for="idReceberEmail">Quero receber e-mail</label>

            <br><br>

            <label for="idSenha">Senha</label>
            <br>
            <input type="password" name="senha" id="idSenha">
        </fieldset>
        <fieldset>
            <legend>Informações adicionais</legend>

            <input type="radio" name="pessoaFisica" id="idPessoaFisica">
            <label for="idPessoaFisica">Pessoa Física</label>

            <input type="radio" name="pessoaJuridica" id="idPessoaJuridica">
            <label for="idPessoaJuridica">Pessoa Jurídica</label>
        </fieldset>

        <br>

        <input type="submit" value="Cadastrar">
    </form>
</body>
</html>
